project:
  name: Linux-Command-Note (LCN)
  version: 0.1.0
  environment:
    windows: Frontend Dev (HTML5, Bootstrap 5, Vanilla JS)
    linux: Ubuntu 25.10, Xfce 4.20, Bash, jq, curl
  architecture: Web + Serverless (GitHub API / Gist) + Bash CLI

current_phase: 2_Linux_CLI_Testing # 当前阶段：Linux 终端消费端测试

tasks:
  - id: t1_setup_repo
    desc: 创建项目目录结构与 AI 核心文档
    state: completed
  - id: t2_data_schema
    desc: 制定前后端 JSON 数据格式 (schema.json)
    state: completed
  - id: t3_frontend_ui
    desc: 开发 Web 端 HTML5+Bootstrap 基础页面
    state: completed
  - id: t4_github_api
    desc: 开发 Web 端读写 GitHub Gist 的 JS 逻辑 (打通云端数据库)
    state: completed
  - id: t5_bash_cli
    desc: 开发 Linux 端 lcn 交互脚本 (read -e -i)
    state: in_progress # 下一步重点
  - id: t6_llm_integration
    desc: Web 端集成大模型 API 辅助生成命令
    state: pending

docs_index:
  status: docs/project_status.yaml
  architecture: docs/architecture.md
  schema: docs/schema.json

notes:
  - 数据存储已由 Repo JSON 切换为 Secret Gist，成功实现了代码与数据的物理隔离，避免污染 Git 提交历史。